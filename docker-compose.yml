services:
  webhook-inspector:
    image: ghcr.io/bellum19/webcatch:latest
    build: .
    container_name: webhook-inspector
    ports:
      - "9120:9120"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    # Uncomment for Linux if you need host.docker.internal to reach a local LLM
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    restart: unless-stopped
